# Feature type catalogue. Cities pick their types in cities.yaml (`types:`);
# an entry's `variants:` overrides `match` per country code or city id
# (city id wins). Guiding principle: community-DEFINING amenities.
#
# Match rules:
#   { key: <tag>, in: [v1, v2] }        tag equals one of the values
#   { key: <tag>, contains: [s1, s2] }  tag value contains substring (case-insensitive)
#   { key: <tag>, exists: true }        tag present
#   { any: [...] } / { all: [...] } / { not: rule }

# ---- food ----------------------------------------------------------------

- id: supermarket
  name: Supermarkets
  # chain supermarkets: branded, or matching the country's big-chain names
  match: { all: [ { key: shop, in: [supermarket] }, { key: brand, exists: true } ] }
  variants:
    uk:
      match:
        any:
          - all:
              - { key: shop, in: [supermarket] }
              - any:
                  - { key: brand, exists: true }
                  - { key: name, contains: [tesco, sainsbury, asda, morrisons, aldi, lidl, waitrose, "marks & spencer", "m&s", co-op, coop, iceland, budgens, "whole foods"] }
          # M&S department stores contain a Foodhall — count them
          - all:
              - { key: shop, in: [department_store] }
              - any:
                  - { key: brand, contains: ["marks & spencer", "m&s"] }
                  - { key: name, contains: ["marks & spencer", "m&s"] }
    pt: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: [continente, "pingo doce", intermarché, intermarche, minipreço, "mini preço", lidl, aldi, spar, auchan, "el corte inglés"] } ] } ] } }
    es: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: [mercadona, carrefour, lidl, aldi, alcampo, eroski, ahorramas, "el corte inglés", consum, caprabo, bonpreu, "supercor", "dia"] } ] } ] } }
    fr: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: [carrefour, monoprix, franprix, auchan, leclerc, intermarché, casino, lidl, aldi, "super u", picard, "naturalia"] } ] } ] } }
    de: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: [edeka, rewe, lidl, aldi, netto, penny, kaufland, norma, tegut, denns] } ] } ] } }
    at: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: [billa, spar, hofer, penny, lidl, merkur, adeg] } ] } ] } }
    ch: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: [migros, coop, denner, lidl, aldi, volg, manor] } ] } ] } }
    hu: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: [tesco, spar, aldi, lidl, penny, auchan, cba, coop, príma, prima] } ] } ] } }
    tr: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: [migros, a101, bim, "bi̇m", şok, sok, carrefoursa, macrocenter, "happy center", "file market"] } ] } ] } }
    us: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: ["whole foods", "trader joe", safeway, "key food", c-town, gristedes, "stop & shop", wegmans, kroger, aldi, "food bazaar", associated, "foodtown"] } ] } ] } }
    it: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: [esselunga, conad, coop, carrefour, pam, lidl, aldi, crai, despar, "il gigante", iper] } ] } ] } }
    pl: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: [biedronka, lidl, carrefour, auchan, netto, aldi, stokrotka, polomarket, dino, "intermarché"] } ] } ] } }
    ro: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: ["mega image", carrefour, kaufland, lidl, penny, profi, auchan] } ] } ] } }
    nl: { match: { all: [ { key: shop, in: [supermarket] }, { any: [ { key: brand, exists: true }, { key: name, contains: ["albert heijn", jumbo, lidl, aldi, dirk, plus, coop, spar, vomar, dekamarkt, ekoplaza, "marqt"] } ] } ] } }

- id: grocery
  name: Grocery stores
  # everything smaller: corner shops, convenience, greengrocers, and
  # unbranded "supermarkets" (Krishna's of Orpington belongs here)
  match:
    any:
      - { key: shop, in: [convenience, greengrocer, grocery, deli, food, general] }
      - { all: [ { key: shop, in: [supermarket] }, { not: { key: brand, exists: true } } ] }

- id: bakery
  name: Bakeries
  match: { key: shop, in: [bakery] }

- id: market
  name: Market halls
  match: { key: amenity, in: [marketplace] }

- id: cafe
  name: Cafés
  match: { key: amenity, in: [cafe] }
  variants:
    pt: { match: { any: [ { key: amenity, in: [cafe] }, { key: shop, in: [pastry] } ] } }

- id: pub
  name: Pubs
  match: { key: amenity, in: [pub, biergarten] }

# for fun: the Greggs shop network
- id: greggs
  name: Greggs
  match:
    all:
      - { any: [ { key: shop, exists: true }, { key: amenity, exists: true } ] }
      - any:
          - { key: brand, in: [Greggs] }
          - { key: name, contains: [greggs] }

# ---- civic ---------------------------------------------------------------

- id: townhall
  name: Town halls
  match: { key: amenity, in: [townhall] }

- id: post_office
  name: Post offices
  match: { key: amenity, in: [post_office] }

- id: pharmacy
  name: Pharmacies
  match:
    any:
      - { key: amenity, in: [pharmacy] }
      - { key: healthcare, in: [pharmacy] }

- id: doctors
  name: Doctors
  match:
    any:
      - { key: amenity, in: [doctors, clinic] }
      - { key: healthcare, in: [doctor, clinic] }

# comparing primary with secondary schools is meaningless — separate groups
# (tagging is UK-tuned: `school=` values + name heuristics)
- id: primary_school
  name: Primary schools
  match:
    all:
      - { key: amenity, in: [school] }
      - any:
          - { key: school, contains: [primary, infant, junior, first] }
          - { key: name, contains: [primary, infant, junior] }
          - { key: "isced:level", in: ["1", "0-1", "0;1", "1;2"] }

- id: secondary_school
  name: Secondary schools
  match:
    all:
      - { key: amenity, in: [school] }
      - any:
          - { key: school, contains: [secondary, high, senior] }
          - { key: name, contains: [secondary, "high school", "sixth form"] }
          - { key: "isced:level", in: ["2", "3", "2-3", "2;3", "3;4"] }

- id: playground
  name: Playgrounds
  match: { key: leisure, in: [playground] }

# ---- transport -----------------------------------------------------------

- id: bus_stop
  name: Bus stops
  match: { key: highway, in: [bus_stop] }

# rail + metro combined — the sensible "station" group for cities where
# splitting heavy rail from underground is meaningless to residents
- id: station
  name: Rail & metro stations
  match:
    all:
      - { key: railway, in: [station, halt] }
      - not: { key: station, in: [monorail, funicular, miniature] }

- id: rail_station
  name: Rail stations
  match:
    all:
      - { key: railway, in: [station, halt] }
      - not: { key: station, in: [subway, light_rail, monorail, funicular, miniature] }
      - not: { key: subway, in: ["yes"] }

- id: metro_station
  name: Metro stations
  # subway + light rail (Underground, DLR, U-Bahn, Metro do Porto, BART…)
  match:
    all:
      - { key: railway, in: [station] }
      - any:
          - { key: station, in: [subway, light_rail] }
          - { key: subway, in: ["yes"] }

- id: tram_stop
  name: Tram stops
  match: { key: railway, in: [tram_stop] }

- id: transit
  name: Public transport (any)
  # union of all modes; ferry terminals count where ferries are transit
  match:
    any:
      - { key: highway, in: [bus_stop] }
      - { key: railway, in: [tram_stop, station, halt] }
  variants:
    istanbul: &transit_with_ferry
      match:
        any:
          - { key: highway, in: [bus_stop] }
          - { key: railway, in: [tram_stop, station, halt] }
          - { key: amenity, in: [ferry_terminal] }
    new_york: *transit_with_ferry
    san_francisco: *transit_with_ferry
